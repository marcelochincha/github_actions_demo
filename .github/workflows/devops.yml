name: CI basico Python + Bash
run-name: "CI disparado por ${{ github.actor }}"

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      build_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest -q

      - name: Compute build tag
        id: meta
        run: |
          TS=$(date +%Y%m%d-%H%M%S)
          echo "tag=${TS}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Save artifact (sample log)
        run: |
          echo "Build tag: ${{ steps.meta.outputs.tag }}" > build-info.txt

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tag from previous job
        run: echo "TAG = ${{ needs.test.outputs.build_tag }}"
        env:
          TAG: ${{ needs.test.outputs.build_tag }}

      - name: Create zip
        run: |
          mkdir -p dist
          cp hello.py dist/
          zip -r "app-${{ needs.test.outputs.build_tag }}.zip" dist
          mv "app-${{ needs.test.outputs.build_tag }}.zip" dist/

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: dist/*.zip

  docs:
    runs-on: ubuntu-latest
    needs: [test, package]
    steps:
      - name: Echo info (Bash)
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Evento: $GITHUB_EVENT_NAME"
          echo "Runner: $RUNNER_OS"
          echo "Build tag: ${{ needs.test.outputs.build_tag }}"
